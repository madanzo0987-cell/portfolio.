<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="py-16 text-center bg-white shadow-sm">
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="w-32 h-32 rounded-full mx-auto mb-4 border-4 border-indigo-500">
        <h1 class="text-4xl font-bold">Your Name</h1>
        <p class="text-gray-600 mt-2">Full Stack Developer | Supabase Enthusiast</p>
    </header>

    <section class="max-w-5xl mx-auto py-12 px-4">
        <h2 class="text-2xl font-bold mb-8 text-center">Certifications</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-4 shadow rounded-lg hover:shadow-lg transition">
                <img src="https://via.placeholder.com/200x150" alt="Cert 1" class="rounded mb-2">
                <p class="font-semibold text-sm text-center">Cloud Architecture</p>
            </div>
            <div class="bg-white p-4 shadow rounded-lg hover:shadow-lg transition">
                <img src="https://via.placeholder.com/200x150" alt="Cert 2" class="rounded mb-2">
                <p class="font-semibold text-sm text-center">Frontend Mastery</p>
            </div>
            <div class="bg-white p-4 shadow rounded-lg hover:shadow-lg transition">
                <img src="https://via.placeholder.com/200x150" alt="Cert 3" class="rounded mb-2">
                <p class="font-semibold text-sm text-center">Backend Logic</p>
            </div>
            <div class="bg-white p-4 shadow rounded-lg hover:shadow-lg transition">
                <img src="https://via.placeholder.com/200x150" alt="Cert 4" class="rounded mb-2">
                <p class="font-semibold text-sm text-center">Database Management</p>
            </div>
        </div>
    </section>

    <section class="max-w-xl mx-auto py-12 px-4">
        <div class="bg-white p-8 rounded-xl shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Work with me</h2>
            <form id="contactForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Name</label>
                    <input type="text" id="name" required class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="email" required class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium">Message</label>
                    <textarea id="message" rows="4" required class="w-full p-2 border border-gray-300 rounded mt-1 focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Send Message</button>
            </form>
            <p id="statusMsg" class="mt-4 text-center text-sm hidden"></p>
        </div>
    </section>

    <script>
    // Initialize Supabase (Use your actual URL and Key or the CI/CD placeholders)
    const _supabase = supabase.createClient('{{https://ovvstxqsjrkbbapzzjzy.supabase.co}}', '{{eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dnN0eHFzanJrYmJhcHp6anp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNjE3MzksImV4cCI6MjA4NzczNzczOX0.tO387Ut-wTmvGmOQIZmSoRUdo9cQcvQ-CmjuAcbMl5w}}');

    const contactForm = document.getElementById('contactForm');
    const statusMsg = document.getElementById('statusMsg');

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Visual feedback: Disable button while sending
        const submitBtn = contactForm.querySelector('button');
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";

        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
        };

        // RECTIFIED: Pointing to 'feedback' table
        const { error } = await _supabase
            .from('feedback')
            .insert([formData]);

        if (error) {
            statusMsg.textContent = "Error: " + error.message;
            statusMsg.className = "mt-4 text-center text-sm text-red-500";
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Message";
        } else {
            statusMsg.textContent = "Feedback received! Thank you.";
            statusMsg.className = "mt-4 text-center text-sm text-green-500";
            contactForm.reset();
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Message";
        }
        statusMsg.classList.remove('hidden');
    });
</script>
</body>
</html>
